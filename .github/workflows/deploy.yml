name: React CI/CD

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Clean Install
        run: |
          rm -rf node_modules package-lock.json
          npm install

      - name: Build
        run: npm run build